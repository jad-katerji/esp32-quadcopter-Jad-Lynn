; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

;Specify the upload port
upload_port = COM3
;upload_speed = 115200
monitor_port = COM3
monitor_speed = 115200

lib_deps = 
     madhephaestus/ESP32Servo @ ^3.1.3 ;for controlling ESCs
     adafruit/Adafruit_VL53L0X @ ^1.2.4 ;for distance sensing via ToF
     adafruit/Adafruit MPU6050 @ ^2.2.9 ;for IMU data
     adafruit/Adafruit BMP280 Library @ ^3.0.0 ;for barometric pressure sensing
     links2004/WebSockets @ ^2.7.3 ;for WebSocket communication



